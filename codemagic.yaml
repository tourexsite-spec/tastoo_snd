workflows:
  android-workflow:
    name: Tastoo SND Android Build
    max_build_duration: 60

    environment:
      flutter: stable
      java: 17

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle

    scripts:
      - echo "Starting build..."
      - flutter clean
      - flutter pub get
      - flutter doctor
      - flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - xebiblog@gmail.com
